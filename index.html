<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>DeepSeek Chat</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #e0e0e0;
      display: flex; flex-direction: column; height: 100dvh;
      overflow: hidden;
    }

    /* 头部 */
    .header {
      background: #16213e; padding: 15px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: relative; z-index: 10;
    }
    .header .menu-btn {
      background: none; border: none; color: white; font-size: 24px;
      cursor: pointer; padding: 5px;
    }
    .header .title {
      font-size: 18px; font-weight: bold; letter-spacing: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 60%;
    }

    /* 聊天容器 */
    .chat-container {
      flex: 1; overflow-y: auto; padding: 15px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .message {
      max-width: 85%; padding: 12px 16px; border-radius: 18px;
      line-height: 1.5; word-wrap: break-word; font-size: 15px;
      animation: fadeIn 0.2s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .user {
      align-self: flex-end; background: #0f3460; color: white;
      border-bottom-right-radius: 4px;
    }
    .assistant {
      align-self: flex-start; background: #533483; color: #f0e6ff;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex; padding: 10px; background: #16213e;
      border-top: 1px solid #3a3a5c; gap: 8px;
    }
    #userInput {
      flex: 1; padding: 12px 16px; border-radius: 25px;
      border: none; outline: none; font-size: 15px;
      background: #2a2a4a; color: white;
    }
    #userInput::placeholder { color: #aaa; }
    #sendBtn {
      padding: 12px 20px; border-radius: 25px; border: none;
      background: #e94560; color: white; font-weight: bold;
      font-size: 15px; cursor: pointer;
    }

    /* 侧边栏 */
    .sidebar {
      position: fixed; top: 0; left: -80%; width: 80%; height: 100%;
      background: #16213e; transition: left 0.3s; z-index: 20;
      display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }
    .sidebar.open { left: 0; }
    .sidebar .sidebar-header {
      padding: 20px 15px; border-bottom: 1px solid #3a3a5c;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar .sidebar-header h2 { font-size: 18px; }
    .new-chat-btn {
      background: #e94560; border: none; color: white; padding: 8px 12px;
      border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .chat-list {
      flex: 1; overflow-y: auto; padding: 10px;
    }
    .chat-item {
      padding: 12px 10px; border-radius: 10px; margin-bottom: 5px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.2s;
    }
    .chat-item:hover, .chat-item.active { background: #2a2a4a; }
    .chat-item .chat-info {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .chat-item .chat-title {
      font-weight: 500; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-item .chat-time {
      font-size: 12px; color: #aaa; margin-top: 2px;
    }
    .chat-item .delete-btn {
      background: none; border: none; color: #e94560; font-size: 18px;
      cursor: pointer; padding: 5px; margin-left: 5px;
    }
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 15; display: none;
    }
    .overlay.show { display: block; }

    .loading {
      display: inline-block; width: 10px; height: 10px;
      background: #ccc; border-radius: 50%; animation: blink 1s infinite;
      margin-left: 8px;
    }
    @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  </style>
</head>
<body>
  <!-- 遮罩 -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- 侧边栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>对话列表</h2>
      <button class="new-chat-btn" onclick="createNewChat()">＋ 新对话</button>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- 主界面 -->
  <div class="header">
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div class="title" id="currentChatTitle">DeepSeek 助手</div>
    <div style="width:40px"></div> <!-- 占位让标题居中 -->
  </div>

  <div class="chat-container" id="chatBox">
    <div class="message assistant">你好！我是 DeepSeek，有什么可以帮你？</div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息…" autocomplete="off" />
    <button id="sendBtn">发送</button>
  </div>

  <script>
    // ========== 在这里替换你的 API Key ==========
    const API_KEY = 'sk-28f936060f9e4b44a0ea166df889e86e';
    const API_URL = 'https://api.deepseek.com/v1/chat/completions';
    // ===========================================

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatListDiv = document.getElementById('chatList');
    const currentChatTitle = document.getElementById('currentChatTitle');

    // 对话管理
    let chats = JSON.parse(localStorage.getItem('deepseek_chat_list') || '[]');
    let currentChatId = localStorage.getItem('deepseek_current_chat') || null;
    let messages = [];

    // 确保至少有一个对话
    if (chats.length === 0) {
      const newChat = {
        id: generateId(),
        title: '新对话',
        updatedAt: Date.now()
      };
      chats.push(newChat);
      currentChatId = newChat.id;
      saveChatsList();
      localStorage.setItem('deepseek_current_chat', currentChatId);
      localStorage.setItem('deepseek_chat_' + currentChatId, JSON.stringify([
        { role: 'system', content: '你是一个有帮助的助手。' }
      ]));
    }

    // 如果当前ID不存在，选第一个
    if (!chats.find(c => c.id === currentChatId)) {
      currentChatId = chats[0].id;
      localStorage.setItem('deepseek_current_chat', currentChatId);
    }

    // 加载当前对话消息
    function loadCurrentChat() {
      const stored = localStorage.getItem('deepseek_chat_' + currentChatId);
      messages = stored ? JSON.parse(stored) : [
        { role: 'system', content: '你是一个有帮助的助手。' }
      ];
      // 更新标题
      const chat = chats.find(c => c.id === currentChatId);
      if (chat) currentChatTitle.textContent = chat.title;
      // 显示消息
      chatBox.innerHTML = '';
      messages.forEach(msg => {
        if (msg.role === 'user' || msg.role === 'assistant') {
          addMessageToDOM(msg.role, msg.content);
        }
      });
      if (messages.filter(m => m.role !== 'system').length === 0) {
        addMessageToDOM('assistant', '你好！我是 DeepSeek，有什么可以帮你？');
      }
    }

    function saveCurrentChat() {
      localStorage.setItem('deepseek_chat_' + currentChatId, JSON.stringify(messages));
      // 更新最后活跃时间及标题（取第一条用户消息作为标题）
      const chatIndex = chats.findIndex(c => c.id === currentChatId);
      if (chatIndex > -1) {
        chats[chatIndex].updatedAt = Date.now();
        // 自动设置对话标题：取第一条用户消息，截断20字
        const firstUserMsg = messages.find(m => m.role === 'user');
        if (firstUserMsg) {
          const raw = firstUserMsg.content.trim();
          chats[chatIndex].title = raw.length > 20 ? raw.substring(0,20) + '…' : raw;
        }
        saveChatsList();
        currentChatTitle.textContent = chats[chatIndex].title;
      }
    }

    function saveChatsList() {
      localStorage.setItem('deepseek_chat_list', JSON.stringify(chats));
    }

    function switchChat(chatId) {
      if (chatId === currentChatId) return;
      // 保存当前对话
      saveCurrentChat();
      currentChatId = chatId;
      localStorage.setItem('deepseek_current_chat', currentChatId);
      loadCurrentChat();
      renderChatList();
      closeSidebar();
    }

    function createNewChat() {
      saveCurrentChat();
      const newChat = {
        id: generateId(),
        title: '新对话',
        updatedAt: Date.now()
      };
      chats.unshift(newChat);
      saveChatsList();
      currentChatId = newChat.id;
      localStorage.setItem('deepseek_current_chat', currentChatId);
      localStorage.setItem('deepseek_chat_' + currentChatId, JSON.stringify([
        { role: 'system', content: '你是一个有帮助的助手。' }
      ]));
      loadCurrentChat();
      renderChatList();
      closeSidebar();
    }

    function deleteChat(chatId, e) {
      e.stopPropagation();
      if (chats.length <= 1) {
        alert('至少保留一个对话');
        return;
      }
      if (!confirm('确定删除这个对话吗？')) return;
      // 删除存储
      localStorage.removeItem('deepseek_chat_' + chatId);
      chats = chats.filter(c => c.id !== chatId);
      saveChatsList();
      if (currentChatId === chatId) {
        currentChatId = chats[0].id;
        localStorage.setItem('deepseek_current_chat', currentChatId);
        loadCurrentChat();
      }
      renderChatList();
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    // 渲染对话列表
    function renderChatList() {
      chatListDiv.innerHTML = '';
      chats.sort((a,b) => b.updatedAt - a.updatedAt).forEach(chat => {
        const div = document.createElement('div');
        div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
        div.onclick = () => switchChat(chat.id);
        div.innerHTML = `
          <div class="chat-info">
            <span class="chat-title">${escapeHtml(chat.title)}</span>
            <span class="chat-time">${formatTime(chat.updatedAt)}</span>
          </div>
          <button class="delete-btn" onclick="deleteChat('${chat.id}', event)">🗑</button>
        `;
        chatListDiv.appendChild(div);
      });
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
      return date.toLocaleDateString();
    }

    // 侧边栏控制
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('overlay').classList.add('show');
      renderChatList();
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    function addMessageToDOM(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.textContent = content;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msgDiv;
    }

    async function sendMessage() {
      const userText = userInput.value.trim();
      if (!userText) return;

      addMessageToDOM('user', userText);
      userInput.value = '';
      messages.push({ role: 'user', content: userText });
      saveCurrentChat();

      const assistantDiv = addMessageToDOM('assistant', '思考中…');
      const dot = document.createElement('span');
      dot.className = 'loading';
      assistantDiv.appendChild(dot);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: messages,
            stream: false
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || '请求失败');
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        assistantDiv.textContent = reply;
        messages.push({ role: 'assistant', content: reply });
        saveCurrentChat();
      } catch (error) {
        assistantDiv.textContent = '出错了: ' + error.message;
        messages.pop();
        saveCurrentChat();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // 初始化
    loadCurrentChat();
    renderChatList();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
