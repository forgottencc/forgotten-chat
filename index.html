<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>DeepSeek Chat</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #e0e0e0;
      display: flex; flex-direction: column; height: 100dvh;
    }
    .header {
      background: #16213e; padding: 15px; text-align: center;
      font-size: 20px; font-weight: bold; letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .chat-container {
      flex: 1; overflow-y: auto; padding: 15px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .message {
      max-width: 85%; padding: 12px 16px; border-radius: 18px;
      line-height: 1.5; word-wrap: break-word; font-size: 15px;
    }
    .user {
      align-self: flex-end; background: #0f3460; color: white;
      border-bottom-right-radius: 4px;
    }
    .assistant {
      align-self: flex-start; background: #533483; color: #f0e6ff;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      display: flex; padding: 10px; background: #16213e;
      border-top: 1px solid #3a3a5c; gap: 8px;
    }
    #userInput {
      flex: 1; padding: 12px 16px; border-radius: 25px;
      border: none; outline: none; font-size: 15px;
      background: #2a2a4a; color: white;
    }
    #userInput::placeholder { color: #aaa; }
    #sendBtn {
      padding: 12px 20px; border-radius: 25px; border: none;
      background: #e94560; color: white; font-weight: bold;
      font-size: 15px; cursor: pointer;
    }
    .loading {
      display: inline-block; width: 10px; height: 10px;
      background: #ccc; border-radius: 50%; animation: blink 1s infinite;
      margin-left: 8px;
    }
    @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  </style>
</head>
<body>
  <div class="header">🤖 DeepSeek 助手</div>
  <div class="chat-container" id="chatBox">
    <div class="message assistant">你好！我是 DeepSeek，有什么可以帮你？</div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息…" autocomplete="off" />
    <button id="sendBtn">发送</button>
  </div>

  <script>
    // ========== 在这里替换你的 API Key ==========
    const API_KEY = 'sk-28f936060f9e4b44a0ea166df889e86e';
    const API_URL = 'https://api.deepseek.com/v1/chat/completions';
    // ===========================================

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // 保存对话历史
    let messages = [
      { role: 'system', content: '你是一个有帮助的助手。' }
    ];

    function addMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.textContent = content;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return msgDiv;
    }

    async function sendMessage() {
      const userText = userInput.value.trim();
      if (!userText) return;

      // 显示用户消息
      addMessage('user', userText);
      userInput.value = '';
      messages.push({ role: 'user', content: userText });

      // 显示一个“正在输入”的占位
      const assistantDiv = addMessage('assistant', '思考中…');
      const dot = document.createElement('span');
      dot.className = 'loading';
      assistantDiv.appendChild(dot);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: messages,
            stream: false
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || '请求失败');
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        // 替换占位内容
        assistantDiv.textContent = reply;
        messages.push({ role: 'assistant', content: reply });
      } catch (error) {
        assistantDiv.textContent = '出错了: ' + error.message;
        // 出错时从历史里移除刚才的user消息，避免上下文错乱
        messages.pop();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
